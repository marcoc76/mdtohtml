<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown + LaTeX a PDF</title>
    
    <!-- Estilos CSS (KaTeX y propios) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <style>
        /* --- Estilos Generales --- */
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
        }

        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; }

        /* Barra de herramientas */
        .toolbar {
            text-align: center;
            margin-bottom: 15px;
        }

        .btn {
            padding: 10px 20px;
            margin: 0 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.9; }
        .btn-copy { background-color: #3498db; color: white; }
        .btn-print { background-color: #27ae60; color: white; }

        /* Contenedor */
        .container {
            display: flex;
            gap: 20px;
            height: 75vh;
        }

        /* Panel de Entrada */
        .input-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        textarea {
            width: 100%;
            height: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            resize: none;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            box-sizing: border-box;
            background: #fff;
        }

        /* Panel de Salida */
        .output-panel {
            flex: 1;
            background: white;
            padding: 40px;
            border-radius: 8px;
            border: 2px solid #ddd;
            overflow-y: auto;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Estilos del contenido */
        .output-panel h1 { border-bottom: 2px solid #2c3e50; padding-bottom: 10px; margin-top: 0; }
        .output-panel h2 { color: #34495e; border-bottom: 1px solid #eee; }
        .output-panel code { background: #f8f8f8; padding: 2px 5px; border-radius: 3px; color: #c7254e; }
        .output-panel pre { background: #282c34; color: #abb2bf; padding: 15px; border-radius: 5px; overflow-x: auto; }
        .output-panel blockquote { border-left: 4px solid #3498db; padding-left: 15px; color: #555; margin-left: 0; }

        /* Responsive */
        @media (max-width: 768px) {
            .container { flex-direction: column; height: auto; }
            textarea { height: 200px; }
            .output-panel { margin-top: 20px; }
        }

        /* --- ESTILOS DE IMPRESIÓN --- */
        @media print {
            body { background-color: white; padding: 0; }
            h1, .toolbar, .input-panel { display: none !important; }
            .container { display: block; height: auto; }
            .output-panel {
                border: none;
                box-shadow: none;
                padding: 0;
                width: 100%;
                overflow: visible;
            }
            .output-panel pre { border: 1px solid #ddd; }
        }
    </style>
</head>
<body>

    <h1>Convertidor Markdown + LaTeX</h1>
    
    <div class="toolbar">
        <button class="btn btn-copy" onclick="copiarHTML()">📋 Copiar HTML</button>
        <button class="btn btn-print" onclick="imprimirPDF()">🖨️ Imprimir / Guardar PDF</button>
    </div>

    <div class="container">
        <div class="input-panel">
            <textarea id="markdown-input" placeholder="Escribe tu Markdown y LaTeX aquí...">
# Ejemplo de Funcionamiento

Este es un texto en **negrita** y *cursilla*.

## Ecuación de Euler
La identidad de Euler es bella:

 $$ e^{i\pi} + 1 = 0 $$ 
## Física
La energía es igual a la masa por la velocidad de la luz al cuadrado: $E = mc^2$.

### Lista
- [x] Arreglar el error
- [x] Añadir impresión
- [ ] Disfrutar
            </textarea>
        </div>

        <div class="output-panel" id="html-output"></div>
    </div>

    <!-- Scripts JS -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

    <script>
        const inputElement = document.getElementById('markdown-input');
        const outputElement = document.getElementById('html-output');

        function convertir() {
            const texto = inputElement.value;
            
            // Array para guardar las fórmulas ya convertidas a HTML
            let formulasGuardadas = [];

            // 1. Pre-procesamiento: Extraer fórmulas y reemplazarlas por marcadores
            // Esto evita que Marked rompa el código LaTeX
            
            // Primero los bloques $$...$$             let textoConMarcadores = texto.replace(/\$\$([\s\S]+?)\$\$/g, (match, formula) => {
                const index = formulasGuardadas.length;
                // Renderizamos la fórmula a HTML seguro ahora mismo
                const html = katex.renderToString(formula, { displayMode: true, throwOnError: false });
                formulasGuardadas.push(html);
                return `MARCADOR_FORMULA_${index}`; // Marcador único
            });

            // Luego las inline $...$             textoConMarcadores = textoConMarcadores.replace(/\$([^\$\n]+?)\$/g, (match, formula) => {
                const index = formulasGuardadas.length;
                const html = katex.renderToString(formula, { displayMode: false, throwOnError: false });
                formulasGuardadas.push(html);
                return `MARCADOR_FORMULA_${index}`;
            });

            // 2. Convertir Markdown a HTML (ahora es seguro porque no hay símbolos $ raros)
            let htmlFinal = marked.parse(textoConMarcadores);

            // 3. Reemplazar los marcadores con el HTML real de las fórmulas
            formulasGuardadas.forEach((formulaHtml, index) => {
                // Buscamos el marcador exacto y lo reemplazamos
                htmlFinal = htmlFinal.replace(`MARCADOR_FORMULA_${index}`, formulaHtml);
            });

            // 4. Limpiar y Mostrar
            outputElement.innerHTML = DOMPurify.sanitize(htmlFinal);
        }

        function imprimirPDF() {
            window.print();
        }

        function copiarHTML() {
            const html = outputElement.innerHTML;
            navigator.clipboard.writeText(html).then(() => {
                alert('¡HTML copiado al portapapeles!');
            });
        }

        // Eventos
        inputElement.addEventListener('input', convertir);
        inputElement.addEventListener('paste', convertir);

        // Init
        convertir();
    </script>
</body>
</html>
